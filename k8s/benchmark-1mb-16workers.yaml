apiVersion: batch/v1
kind: Job
metadata:
  name: benchmark-1mb-16workers
  namespace: buckets
spec:
  completions: 1
  parallelism: 1
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: benchmark
        image: russellmy/buckets-benchmark:latest
        env:
        - name: S3_ENDPOINT
          value: "http://buckets-lb.buckets.svc.cluster.local:9000"
        - name: AWS_ACCESS_KEY_ID
          value: "minioadmin"
        - name: AWS_SECRET_ACCESS_KEY
          value: "minioadmin"
        - name: AWS_EC2_METADATA_DISABLED
          value: "true"
        command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "=== 1MB BENCHMARK - 8 WORKERS ==="
          echo "Purpose: Test with lower concurrency"
          echo "Endpoint: $S3_ENDPOINT"
          echo "Configuration: 8 workers, 60s duration, 1MB objects"
          echo "Starting at $(date)"
          echo ""
          
          /benchmark \
            -endpoint=$S3_ENDPOINT \
            -bucket=test-1mb-16workers \
            -duration=60s \
            -workers=16 \
            -size=1048576
          
          echo ""
          echo "Benchmark completed at $(date)"
